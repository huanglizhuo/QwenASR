name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The steps below are executed ONLY if release-please creates a new release (PR gets merged)

      - name: Checkout Code
        if: ${{ steps.release.outputs.releases_created }}
        uses: actions/checkout@v4

      # --- 1. Publish Rust Library ---
      - name: Setup Rust
        if: ${{ steps.release.outputs['crates/qwen-asr--release_created'] }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS
        if: ${{ steps.release.outputs['crates/qwen-asr--release_created'] || steps.release.outputs['crates/qwen-asr-cli--release_created'] }}
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Publish to crates.io
        if: ${{ steps.release.outputs['crates/qwen-asr--release_created'] }}
        working-directory: crates/qwen-asr
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      # --- 2. Publish CLI Binary ---
      - name: Setup Rust (CLI)
        if: ${{ steps.release.outputs['crates/qwen-asr-cli--release_created'] }}
        uses: dtolnay/rust-toolchain@stable

      # Ensure qwen-asr is published before the CLI (recovers from a previously
      # failed qwen-asr publish where the GitHub release was created but crates.io
      # never received the crate).
      - name: Ensure qwen-asr is published to crates.io
        if: ${{ steps.release.outputs['crates/qwen-asr-cli--release_created'] }}
        working-directory: crates/qwen-asr
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish || echo "qwen-asr already published, continuing"

      - name: Wait for crates.io index
        if: ${{ steps.release.outputs['crates/qwen-asr-cli--release_created'] }}
        run: sleep 30

      - name: Publish CLI to crates.io
        if: ${{ steps.release.outputs['crates/qwen-asr-cli--release_created'] }}
        working-directory: crates/qwen-asr-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
