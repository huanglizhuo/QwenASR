name: build-binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    # Only run for qwen-asr-cli releases
    if: startsWith(github.event.release.tag_name, 'qwen-asr-cli-v')
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            blas: none
            cpu: apple-m1
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            blas: openblas
            cpu: x86-64-v3

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS (Linux)
        if: matrix.blas == 'openblas'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Build release binary
        env:
          RUSTFLAGS: "-C target-cpu=${{ matrix.cpu }}"
        run: cargo build --release -p qwen-asr-cli

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#qwen-asr-cli-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package binary
        run: |
          ARCHIVE="qwen-asr-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C target/release qwen-asr
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$ARCHIVE"
